<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDS-IAM System | Login</title>
    <style>
        html { background: #0a0e1a; }
* { visibility: visible !important; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
       body {
    font-family: 'Segoe UI', sans-serif;
    background: #0a0e1a !important;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    min-height: 100vh !important;
    color: #fff !important;
    visibility: visible !important;
    opacity: 1 !important;
}
        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }
        .login-container {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0,255,136,0.2);
            border-radius: 16px;
            padding: 48px 40px;
            width: 420px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0,255,136,0.05);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 16px;
        }
        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
        }
        .logo p {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #00ff88;
            background: rgba(0,255,136,0.05);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            border: none;
            border-radius: 8px;
            color: #0a0e1a;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .error-msg {
            background: rgba(255,60,60,0.1);
            border: 1px solid rgba(255,60,60,0.3);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }
        .success-msg {
            background: rgba(0,255,136,0.1);
            border: 1px solid rgba(0,255,136,0.3);
            color: #00ff88;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }
        .role-badges {
            display: flex;
            gap: 8px;
            margin-top: 24px;
            justify-content: center;
        }
        .badge {
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-admin { background: rgba(255,100,100,0.15); color: #ff6464; border: 1px solid rgba(255,100,100,0.3); }
        .badge-analyst { background: rgba(255,200,0,0.15); color: #ffc800; border: 1px solid rgba(255,200,0,0.3); }
        .badge-viewer { background: rgba(0,200,255,0.15); color: #00c8ff; border: 1px solid rgba(0,200,255,0.3); }
        .hint {
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🛡️</div>
            <h1>IDS-IAM System</h1>
            <p>AI-Powered Intrusion Detection & Access Management</p>
        </div>

        <div class="form-group">
            <label>USERNAME</label>
            <input type="text" id="username" placeholder="Enter username" autocomplete="off">
        </div>
        <div class="form-group">
            <label>PASSWORD</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>

        <button class="btn" onclick="login()">LOGIN TO DASHBOARD</button>

        <div class="error-msg" id="error-msg"></div>
        <div class="success-msg" id="success-msg"></div>

        <div class="role-badges">
            <span class="badge badge-admin">ADMIN</span>
            <span class="badge badge-analyst">ANALYST</span>
            <span class="badge badge-viewer">VIEWER</span>
        </div>
        <div class="hint">Default: admin / admin123</div>
    </div>

    <script>
        // Allow Enter key to login
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');

            if (!username || !password) {
                showError('Please enter username and password');
                return;
            }

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store token and user info
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('role', data.role);

                    successMsg.style.display = 'block';
                    successMsg.textContent = `Welcome ${data.username}! Role: ${data.role.toUpperCase()}`;
                    errorMsg.style.display = 'none';

                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 800);
                } else {
                    showError(data.error + (data.warning ? ` — ${data.warning}` : ''));
                }
            } catch (err) {
                showError('Connection error. Is the server running?');
            }
        }

        function showError(msg) {
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'block';
            errorMsg.textContent = msg;
            document.getElementById('success-msg').style.display = 'none';
        }
    </script>
</body>
</html>
